name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run Rust quality gates
        run: make ci-rust

      - name: Upload Rust coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: target/coverage/cobertura.xml
          flags: rust
          fail_ci_if_error: false

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Run frontend quality gates
        run: make ci-frontend

      - name: Upload frontend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: ui/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

      - name: Upload audit reports
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: security-audit-reports
          path: |
            ui/npm-audit.json

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-playwright-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-playwright-

      - name: Build API binary
        run: cargo build -p sim-cli

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ui

      - name: Run Playwright tests
        run: make playwright

  docker:
    name: Docker compose build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run Docker quality gates
        run: make ci-docker

      - name: Print startup logs on failure
        if: failure()
        run: docker compose logs --no-color

  docker-scan:
    name: Docker image scan (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [api, ui]
    steps:
      - uses: actions/checkout@v6
      - name: Install Trivy
        run: |
          TRIVY_VERSION=0.64.1
          curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o /tmp/trivy.tar.gz
          tar -xzf /tmp/trivy.tar.gz -C /tmp
          install /tmp/trivy /usr/local/bin/trivy
          trivy --version
      - name: Scan image with Make
        run: make trivy-scan-${{ matrix.image }}

  security-secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
      - name: Run Gitleaks
        run: make gitleaks

  make-contract:
    name: Makefile contract check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify Make targets resolve
        run: make help && make list && make -n ci-rust ci-frontend ci-playwright ci-docker ci-security rust-audit
