name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Code coverage
        run: cargo install cargo-tarpaulin && cargo tarpaulin --workspace --out xml --skip-clean
        continue-on-error: true

      - name: Upload Rust coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: cobertura.xml
          flags: rust
          fail_ci_if_error: false

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: ui/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

      - name: Build
        run: npm run build

      - name: Audit npm dependencies
        run: npm audit --audit-level=high --json > npm-audit.json || npm audit --audit-level=high

      - name: Upload audit reports
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: security-audit-reports
          path: |
            ui/npm-audit.json

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-playwright-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-playwright-

      - name: Build API binary
        run: cargo build -p sim-cli

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ui

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: ui

  docker:
    name: Docker compose build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build container images
        run: docker compose build

      - name: Start services
        run: |
          cp .env.example .env
          docker compose up -d --wait --wait-timeout 120

      - name: Print startup logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Verify API is healthy
        run: curl -sf http://localhost:3000/api/health > /dev/null

      - name: Verify UI is reachable
        run: curl -sf http://localhost:${UI_PORT:-5173}/health > /dev/null

      - name: Tear down
        if: always()
        run: docker compose down

  docker-scan:
    name: Docker image scan (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [api, ui]
        include:
          - image: api
            context: .
          - image: ui
            context: ui
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build -t arcogine-${{ matrix.image }}:ci ${{ matrix.context }}
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: arcogine-${{ matrix.image }}:ci
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          format: 'table'
          exit-code: '1'

  security-secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
      - name: Run Gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --verbose
