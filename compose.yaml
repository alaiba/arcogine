services:
  api:
    image: arcogine-api:ci
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - type=gha,name=arcogine-api-buildcache
      cache_to:
        - type=gha,mode=max,name=arcogine-api-buildcache
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  ui:
    image: arcogine-ui:ci
    build:
      context: ./ui
      dockerfile: Dockerfile
      cache_from:
        - type=gha,name=arcogine-ui-buildcache
      cache_to:
        - type=gha,mode=max,name=arcogine-ui-buildcache
    ports:
      - "${UI_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5173/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 20
      start_period: 10s
