# Capacity expansion scenario: additional machines relieve the bottleneck.
# Same demand parameters as overload, but with parallel capacity.

[simulation]
rng_seed = 42
max_ticks = 500
demand_eval_interval = 10
agent_eval_interval = 50

[[equipment]]
id = 1
name = "Mill-1"

[[equipment]]
id = 2
name = "Mill-2"

[[equipment]]
id = 3
name = "Lathe"

[[material]]
id = 1
name = "Widget A"
routing_id = 1

[[material]]
id = 2
name = "Widget A (Mill-2)"
routing_id = 2

[[process_segment]]
id = 1
name = "Milling (Mill-1)"
equipment_id = 1
duration = 8

[[process_segment]]
id = 2
name = "Turning"
equipment_id = 3
duration = 5

[[process_segment]]
id = 3
name = "Milling (Mill-2)"
equipment_id = 2
duration = 8

[[operations_definition]]
id = 1
name = "Widget A via Mill-1"
steps = [1, 2]

[[operations_definition]]
id = 2
name = "Widget A via Mill-2"
steps = [3, 2]

[economy]
initial_price = 2.0
base_demand = 5.0
price_elasticity = 0.2
lead_time_sensitivity = 0.02
