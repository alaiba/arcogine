# Overload scenario: low price drives high demand, creating backlog
# and bottlenecks. Tests that the system degrades gracefully under load.

[simulation]
rng_seed = 42
max_ticks = 500
demand_eval_interval = 10
agent_eval_interval = 50

[[equipment]]
id = 1
name = "Mill"

[[equipment]]
id = 2
name = "Lathe"

[[material]]
id = 1
name = "Widget A"
routing_id = 1

[[process_segment]]
id = 1
name = "Milling"
equipment_id = 1
duration = 8

[[process_segment]]
id = 2
name = "Turning"
equipment_id = 2
duration = 5

[[operations_definition]]
id = 1
name = "Widget A routing"
steps = [1, 2]

[economy]
initial_price = 2.0
base_demand = 5.0
price_elasticity = 0.2
lead_time_sensitivity = 0.02
